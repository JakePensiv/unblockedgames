<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three in a Row</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #dcfce7 0%, #bbf7d0 100%);
      color: #14532d;
    }

    .game-shell {
      width: min(92vw, 560px);
      background: rgba(255, 255, 255, 0.86);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(20, 83, 45, 0.12);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .cell {
      aspect-ratio: 1;
      border: 0;
      border-radius: 18px;
      background: #f0fdf4;
      color: #14532d;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      background: #16a34a;
      color: white;
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="hud">
      <div>
        <strong id="statusLabel">Player X's turn</strong>
        <p>First to connect three wins.</p>
      </div>
      <button id="restartButton" type="button">Reset Board</button>
    </div>
    <div id="board" class="board"></div>
  </div>

  <script>
    const statusLabel = document.getElementById("statusLabel");
    const board = document.getElementById("board");
    const restartButton = document.getElementById("restartButton");
    const winningLines = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    let cells = Array(9).fill("");
    let currentPlayer = "X";
    let gameFinished = false;

    function renderBoard() {
      board.innerHTML = cells.map((value, index) => `
        <button class="cell" data-index="${index}" type="button">${value}</button>
      `).join("");

      board.querySelectorAll(".cell").forEach((cell) => {
        cell.addEventListener("click", () => playMove(Number(cell.dataset.index)));
      });
    }

    function playMove(index) {
      if (cells[index] || gameFinished) {
        return;
      }

      cells[index] = currentPlayer;
      const winner = getWinner();

      if (winner) {
        gameFinished = true;
        statusLabel.textContent = `Player ${winner} wins`;
      } else if (cells.every(Boolean)) {
        gameFinished = true;
        statusLabel.textContent = "Draw game";
      } else {
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        statusLabel.textContent = `Player ${currentPlayer}'s turn`;
      }

      renderBoard();
    }

    function getWinner() {
      return winningLines.find(([a, b, c]) => cells[a] && cells[a] === cells[b] && cells[b] === cells[c])
        ? currentPlayer
        : "";
    }

    function resetBoard() {
      cells = Array(9).fill("");
      currentPlayer = "X";
      gameFinished = false;
      statusLabel.textContent = "Player X's turn";
      renderBoard();
    }

    restartButton.addEventListener("click", resetBoard);
    resetBoard();
  </script>
</body>
</html>
