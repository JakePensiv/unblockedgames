<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meteor Dodge</title>
  <style>
    :root {
      color-scheme: only light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      color: white;
    }

    .game-shell {
      width: min(92vw, 720px);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }

    .hud button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      background: #f97316;
      color: white;
    }

    canvas {
      width: 100%;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="hud">
      <strong id="scoreLabel">Score: 0</strong>
      <span>Use Left / Right arrows</span>
      <button id="restartButton" type="button">Restart</button>
    </div>
    <canvas id="gameCanvas" width="720" height="480"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const context = canvas.getContext("2d");
    const scoreLabel = document.getElementById("scoreLabel");
    const restartButton = document.getElementById("restartButton");

    let player;
    let meteors;
    let score;
    let gameOver;
    let animationFrameId;
    const keys = new Set();

    function resetGame() {
      player = { x: canvas.width / 2 - 30, y: canvas.height - 48, width: 60, height: 18, speed: 7 };
      meteors = [];
      score = 0;
      gameOver = false;
      scoreLabel.textContent = "Score: 0";
      cancelAnimationFrame(animationFrameId);
      loop();
    }

    function spawnMeteor() {
      meteors.push({
        x: Math.random() * (canvas.width - 24),
        y: -24,
        size: 18 + Math.random() * 18,
        speed: 3 + Math.random() * 3 + Math.min(score / 35, 4)
      });
    }

    function update() {
      if (keys.has("ArrowLeft")) {
        player.x -= player.speed;
      }

      if (keys.has("ArrowRight")) {
        player.x += player.speed;
      }

      player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

      if (Math.random() < 0.04) {
        spawnMeteor();
      }

      meteors.forEach((meteor) => {
        meteor.y += meteor.speed;
      });

      meteors = meteors.filter((meteor) => meteor.y < canvas.height + meteor.size);

      score += 1;
      scoreLabel.textContent = `Score: ${score}`;

      const hitMeteor = meteors.find((meteor) =>
        meteor.x < player.x + player.width &&
        meteor.x + meteor.size > player.x &&
        meteor.y < player.y + player.height &&
        meteor.y + meteor.size > player.y
      );

      if (hitMeteor) {
        gameOver = true;
      }
    }

    function draw() {
      context.clearRect(0, 0, canvas.width, canvas.height);

      context.fillStyle = "#38bdf8";
      context.fillRect(player.x, player.y, player.width, player.height);

      meteors.forEach((meteor) => {
        context.beginPath();
        context.fillStyle = "#f97316";
        context.arc(meteor.x + meteor.size / 2, meteor.y + meteor.size / 2, meteor.size / 2, 0, Math.PI * 2);
        context.fill();
      });

      if (gameOver) {
        context.fillStyle = "rgba(15, 23, 42, 0.78)";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = "white";
        context.font = "bold 42px Arial";
        context.textAlign = "center";
        context.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 10);
        context.font = "20px Arial";
        context.fillText("Press Restart to try again", canvas.width / 2, canvas.height / 2 + 28);
      }
    }

    function loop() {
      update();
      draw();

      if (!gameOver) {
        animationFrameId = requestAnimationFrame(loop);
      }
    }

    window.addEventListener("keydown", (event) => {
      keys.add(event.key);
    });

    window.addEventListener("keyup", (event) => {
      keys.delete(event.key);
    });

    restartButton.addEventListener("click", resetGame);
    resetGame();
  </script>
</body>
</html>
